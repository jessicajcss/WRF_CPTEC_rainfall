name: WRF Daily Rainfall Forecast

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_start:
        description: 'WRF run start UTC — "YYYY-MM-DD HH:MM" or leave empty to auto-detect'
        required: false
        default: ''
      forecast_end_hr:
        description: 'Forecast end hour (default: 72)'
        required: false
        default: '72'

concurrency:
  group: wrf-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      GITHUB_PAT:           ${{ secrets.GITHUB_TOKEN }}
      GHA_MODE:             'true'
      WRF_RUN_START:        ${{ github.event.inputs.run_start }}
      WRF_FORECAST_END_HR:  ${{ github.event.inputs.forecast_end_hr || '72' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libcurl4-openssl-dev \
            libssl-dev libxml2-dev libfontconfig1-dev \
            libharfbuzz-dev libfribidi-dev libfreetype6-dev \
            libpng-dev libtiff5-dev libjpeg-dev \
            jq gh

      - name: Cache R packages
        id: r-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/r-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Install R packages
        if: steps.r-cache.outputs.cache-hit != 'true'
        run: |
          Rscript -e "
          pkgs <- readLines('.github/r-packages.txt')
          pkgs <- trimws(pkgs)
          pkgs <- pkgs[nzchar(pkgs) & !startsWith(pkgs, '#')]
          repos <- 'https://packagemanager.posit.co/cran/__linux__/jammy/latest'
          install.packages(pkgs, repos = repos, dependencies = TRUE)
          "

      - name: Check required repo files
        run: |
          set -euo pipefail
          test -f "data/shp/SC_Municipios_2024/SC_Municipios_2024.shp" || { echo "Missing shapefile"; exit 1; }
          test -f "outputs/cep_list.rds" || { echo "Missing outputs/cep_list.rds"; exit 1; }

      - name: Run forecast script
        run: |
          set -euo pipefail
          mkdir -p outputs data/WRF_downloads
          Rscript scripts/00-geojson_output.R 2>&1 | tee outputs/run_log.txt

      - name: Validate latest outputs exist
        run: |
          set -euo pipefail
          test -f outputs/latest.json || { echo "ERROR: outputs/latest.json missing"; exit 1; }
          test -f outputs/latest.pmtiles || { echo "ERROR: outputs/latest.pmtiles missing"; exit 1; }

      - name: Determine date label
        id: dlabel
        run: |
          set -euo pipefail
          LATEST_DATE="$(date -u +%Y-%m-%d)"
          echo "latest_date=$LATEST_DATE" >> "$GITHUB_OUTPUT"
          cp outputs/latest.json "outputs/${LATEST_DATE}.json"
          cp outputs/latest.pmtiles "outputs/${LATEST_DATE}.pmtiles"

      - name: Enforce size safety limit (<95MB)
        run: |
          set -euo pipefail
          max=$((95 * 1024 * 1024))
          for f in outputs/latest.json outputs/latest.pmtiles "outputs/${{ steps.dlabel.outputs.latest_date }}.json" "outputs/${{ steps.dlabel.outputs.latest_date }}.pmtiles"; do
            size=$(stat -c%s "$f")
            echo "$f => $size bytes"
            [ "$size" -le "$max" ] || { echo "ERROR: $f exceeds 95MB safety limit"; exit 1; }
          done

      - name: Upload action artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wrf-forecast-${{ github.run_number }}
          path: |
            outputs/*.json
            outputs/*.pmtiles
            outputs/*.png
            outputs/run_log.txt
          retention-days: 30

      - name: Publish latest.* to chuva-sc-76
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone https://x-access-token:${GH_TOKEN}@github.com/jessicajcss/chuva-sc-76.git /tmp/chuva-sc-76
          mkdir -p /tmp/chuva-sc-76/data /tmp/chuva-sc-76/tiles
          cp outputs/latest.json /tmp/chuva-sc-76/data/latest.json
          cp outputs/latest.pmtiles /tmp/chuva-sc-76/tiles/latest.pmtiles

          cd /tmp/chuva-sc-76
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json tiles/latest.pmtiles
          if git diff --staged --quiet; then
            echo "No changes to latest files."
          else
            git commit -m "data: update latest WRF artifacts (${{ steps.dlabel.outputs.latest_date }}) [skip ci]"
            git push
          fi

      - name: Create/update dated release in WRF repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="wrf-${{ steps.dlabel.outputs.latest_date }}"
          TITLE="WRF forecast ${{ steps.dlabel.outputs.latest_date }}"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --notes "Automated WRF artifacts for ${{ steps.dlabel.outputs.latest_date }}"

          gh release upload "$TAG" \
            "outputs/${{ steps.dlabel.outputs.latest_date }}.json" \
            "outputs/${{ steps.dlabel.outputs.latest_date }}.pmtiles" \
            --clobber

      - name: Keep only 7 most recent wrf-* releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --limit 100 --json tagName,createdAt --jq '.[] | select(.tagName|startswith("wrf-")) | [.createdAt,.tagName] | @tsv' | sort -r | awk '{print $2}')
          if [ "${#tags[@]}" -le 7 ]; then
            echo "No pruning needed."
            exit 0
          fi
          for ((i=7; i<${#tags[@]}; i++)); do
            gh release delete "${tags[$i]}" --yes --cleanup-tag
          done
