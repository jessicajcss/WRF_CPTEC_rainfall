name: WRF Daily Rainfall Forecast

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      run_start:
        description: 'WRF run start UTC — "YYYY-MM-DD HH:MM" or leave empty to auto-detect'
        required: false
        default: ''
      forecast_end_hr:
        description: 'Forecast end hour (default: 72)'
        required: false
        default: '72'

jobs:
  forecast:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      GITHUB_PAT:           ${{ secrets.GITHUB_TOKEN }}
      GHA_MODE:             'true'
      WRF_RUN_START:        ${{ github.event.inputs.run_start }}
      WRF_FORECAST_END_HR:  ${{ github.event.inputs.forecast_end_hr || '72' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libcurl4-openssl-dev \
            libssl-dev libxml2-dev libfontconfig1-dev \
            libharfbuzz-dev libfribidi-dev libfreetype6-dev \
            libpng-dev libtiff5-dev libjpeg-dev \
            jq gh

      - name: Cache R packages
        id: r-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/r-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Install R packages
        if: steps.r-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          Rscript -e "
          pkgs <- readLines('.github/r-packages.txt')
          pkgs <- trimws(pkgs)
          pkgs <- pkgs[nzchar(pkgs) & !startsWith(pkgs, '#')]
          repos <- 'https://packagemanager.posit.co/cran/__linux__/jammy/latest'
          install.packages(pkgs, repos = repos, dependencies = TRUE)
          cat('Installed:', length(pkgs), 'packages\n')
          "

      - name: Check required repo files
        run: |
          set -euo pipefail
          test -f "data/shp/SC_Municipios_2024/SC_Municipios_2024.shp" \
            || { echo "ERROR: shapefile not found. Commit it to data/shp/"; exit 1; }
          test -f "outputs/cep_list.rds" \
            || { echo "ERROR: outputs/cep_list.rds not found. Generate via 00_build_cep_list.R and commit it."; exit 1; }
          echo "All required files present."

      - name: Run WRF forecast + build Lovable artifacts
        run: |
          set -euo pipefail
          mkdir -p outputs data/WRF_downloads
          Rscript scripts/00-geojson_output.R 2>&1 | tee outputs/run_log.txt

      - name: Debug outputs folder
        if: always()
        run: |
          echo "=== outputs tree ==="
          find outputs -maxdepth 2 -type f | sort || true

      - name: Validate expected outputs (Lovable + nested geojson)
        run: |
          set -euo pipefail
          NESTED=$(ls outputs/wrf_cep_forecast_*_nested.geojson 2>/dev/null | head -1)
          test -n "$NESTED" || { echo "ERROR: No nested geojson found"; exit 1; }

          test -f outputs/latest.json || { echo "ERROR: outputs/latest.json missing"; exit 1; }
          test -f outputs/available_runs.json || { echo "ERROR: outputs/available_runs.json missing"; exit 1; }

          test -f outputs/points_lite_now_latest.geojson || { echo "ERROR: points_lite_now_latest missing"; exit 1; }
          test -f outputs/points_lite_peak_12_latest.geojson || { echo "ERROR: points_lite_peak_12_latest missing"; exit 1; }
          test -f outputs/points_lite_peak_24_latest.geojson || { echo "ERROR: points_lite_peak_24_latest missing"; exit 1; }
          test -f outputs/points_lite_peak_48_latest.geojson || { echo "ERROR: points_lite_peak_48_latest missing"; exit 1; }
          test -f outputs/points_lite_peak_72_latest.geojson || { echo "ERROR: points_lite_peak_72_latest missing"; exit 1; }

      - name: Enforce file size safety limit (<95MB each)
        run: |
          set -euo pipefail
          max=$((95 * 1024 * 1024))
          check() {
            f="$1"
            [ -f "$f" ] || { echo "ERROR: missing $f"; exit 1; }
            size=$(stat -c%s "$f")
            echo "$f => $size bytes"
            [ "$size" -le "$max" ] || { echo "ERROR: $f exceeds 95MB"; exit 1; }
          }

          check outputs/latest.json
          check outputs/available_runs.json
          check outputs/points_lite_now_latest.geojson
          check outputs/points_lite_peak_12_latest.geojson
          check outputs/points_lite_peak_24_latest.geojson
          check outputs/points_lite_peak_48_latest.geojson
          check outputs/points_lite_peak_72_latest.geojson

          NESTED=$(ls outputs/wrf_cep_forecast_*_nested.geojson 2>/dev/null | head -1)
          check "$NESTED"

      - name: Create GitHub Release and upload 72h nested GeoJSON gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GEOJSON=$(ls outputs/wrf_cep_forecast_*_nested.geojson 2>/dev/null | head -1)
          RUN_ID=$(basename "$GEOJSON" | grep -oP '\d{10}')

          GZ_FILE="${GEOJSON}.gz"
          TAG="wrf-${RUN_ID}"

          gzip -k "$GEOJSON"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "WRF forecast ${RUN_ID}" \
            --notes "Automated WRF CPTEC rainfall forecast for run ${RUN_ID}. Nested GeoJSON (gzip compressed)." \
            --latest=false \
            "$GZ_FILE"

      - name: Keep only 7 most recent wrf-* releases (delete release + tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --limit 200 --json tagName,createdAt \
            --jq '.[] | select(.tagName|startswith("wrf-")) | [.createdAt,.tagName] | @tsv' \
            | sort -r | awk '{print $2}')

          if [ "${#tags[@]}" -le 7 ]; then exit 0; fi
          for ((i=7; i<${#tags[@]}; i++)); do
            gh release delete "${tags[$i]}" --yes --cleanup-tag
          done

      - name: Commit Lovable outputs (small files only)
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            outputs/latest.json \
            outputs/available_runs.json \
            outputs/points_lite_*.geojson \
            outputs/*.png \
            outputs/run_log.txt 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            RUN_LABEL=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "forecast: update Lovable artifacts ${RUN_LABEL} [skip ci]"
            git push
          fi
