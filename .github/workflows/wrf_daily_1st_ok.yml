name: WRF Daily Rainfall Forecast

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      run_start:
        description: 'WRF run start UTC — "YYYY-MM-DD HH:MM" or leave empty to auto-detect'
        required: false
        default: ''
      forecast_end_hr:
        description: 'Forecast end hour (default: 72)'
        required: false
        default: '72'

concurrency:
  group: wrf-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      GITHUB_PAT:           ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
      GHA_MODE:             'true'
      WRF_RUN_START:        ${{ github.event.inputs.run_start }}
      WRF_FORECAST_END_HR:  ${{ github.event.inputs.forecast_end_hr || '72' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libcurl4-openssl-dev \
            libssl-dev libxml2-dev libfontconfig1-dev \
            libharfbuzz-dev libfribidi-dev libfreetype6-dev \
            libpng-dev libtiff5-dev libjpeg-dev

      - name: Cache R packages
        id: r-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/r-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Install R packages
        if: steps.r-cache.outputs.cache-hit != 'true'
        run: |
          Rscript -e "
          pkgs <- readLines('.github/r-packages.txt')
          pkgs <- trimws(pkgs)
          pkgs <- pkgs[nzchar(pkgs) & !startsWith(pkgs, '#')]
          repos <- 'https://packagemanager.posit.co/cran/__linux__/jammy/latest'
          install.packages(pkgs, repos = repos, dependencies = TRUE)
          cat('Installed:', length(pkgs), 'packages\n')
          "

      - name: Check required repo files
        run: |
          echo "--- Checking required files ---"
          test -f "data/shp/SC_Municipios_2024/SC_Municipios_2024.shp" \
            || { echo "ERROR: shapefile not found."; exit 1; }
          test -f "outputs/cep_list.rds" \
            || { echo "ERROR: outputs/cep_list.rds not found."; exit 1; }
          echo "All required files present."

      - name: Run WRF forecast
        run: |
          mkdir -p outputs data/WRF_downloads
          Rscript scripts/00-geojson_output.R 2>&1 | tee outputs/run_log.txt

      - name: Gzip the GeoJSON
        run: |
          GEOJSON_FILE=$(ls outputs/wrf_cep_forecast_*_nested.geojson 2>/dev/null | head -1)
          if [ -n "$GEOJSON_FILE" ]; then
            gzip -9 -k "$GEOJSON_FILE"
            echo "Gzipped: ${GEOJSON_FILE}.gz"
            ls -lh "${GEOJSON_FILE}.gz"
          else
            echo "No nested GeoJSON found to gzip."
          fi

      - name: Create GitHub Release and upload gz asset
        run: |
          if [ ! -f outputs/latest.json ]; then
            echo "outputs/latest.json not found — skipping release upload."
            exit 0
          fi
          RUN_ID=$(python3 -c "import json, sys; d=json.load(open('outputs/latest.json')); v=d.get('run_id',''); print(v) if v else sys.exit(1)")
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          TAG="wrf-${RUN_ID}"
          GEOJSON_GZ=$(ls outputs/wrf_cep_forecast_*_nested.geojson.gz 2>/dev/null | head -1)

          if [ -z "$GEOJSON_GZ" ]; then
            echo "No .geojson.gz file found — skipping release upload."
            exit 0
          fi

          # Delete old release with same tag if it exists (idempotent)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "WRF Forecast ${RUN_ID}" \
            --notes "Automated WRF 72h rainfall forecast. Run ID: ${RUN_ID}" \
            --latest=false \
            "$GEOJSON_GZ"

      - name: Overwrite outputs/latest.json with release asset URL
        run: |
          GEOJSON_GZ=$(ls outputs/wrf_cep_forecast_*_nested.geojson.gz 2>/dev/null | head -1)
          if [ -z "$GEOJSON_GZ" ]; then
            echo "No .geojson.gz file found — skipping latest.json update."
            exit 0
          fi
          GENERATED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GZ_NAME=$(basename "$GEOJSON_GZ")
          cat > outputs/latest.json <<EOF
          {
            "run_id": "${RUN_ID}",
            "generated_at": "${GENERATED_AT}",
            "geojson_gz_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/wrf-${RUN_ID}/${GZ_NAME}",
            "ceps_xlsx_url": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/data/ceps.xlsx"
          }
          EOF
          echo "latest.json written:"
          cat outputs/latest.json

      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wrf-forecast-${{ github.run_number }}
          path: |
            outputs/*.png
            outputs/run_log.txt
            outputs/latest.json
          retention-days: 30

      - name: Commit small forecast outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add ONLY small files — never the large .geojson or .geojson.gz
          git add outputs/latest.json 2>/dev/null || true
          git add outputs/run_log.txt 2>/dev/null || true
          git add outputs/forecast_map_*.png 2>/dev/null || true
          # Explicitly ensure large GeoJSON files are NOT staged
          git reset outputs/*.geojson 2>/dev/null || true
          git reset outputs/*.geojson.gz 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No small-file changes to commit."
          else
            RUN_LABEL=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "forecast: WRF rainfall update ${RUN_LABEL} [skip ci]"
            git push
          fi
